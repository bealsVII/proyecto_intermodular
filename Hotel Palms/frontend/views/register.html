<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Hotel Palms</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="bg-light">

    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-md-6 col-lg-5">
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <div class="text-center mb-4">
                            <i class="bi bi-person-plus text-primary" style="font-size: 3rem;"></i>
                            <h3 class="mt-2">Crear una cuenta</h3>
                            <p class="text-muted">Regístrate para empezar a hacer reservas</p>
                        </div>

                        <form id="registerForm" novalidate>
                            <!-- Nombre y Apellidos -->
                            <div class="row">
                                <div class="col-6 mb-3">
                                    <label for="firstName" class="form-label">Nombre</label>
                                    <input type="text" class="form-control" id="firstName"
                                           required minlength="2" maxlength="50">
                                    <div class="invalid-feedback" id="firstNameError"></div>
                                </div>
                                <div class="col-6 mb-3">
                                    <label for="lastName" class="form-label">Apellidos</label>
                                    <input type="text" class="form-control" id="lastName"
                                           required minlength="2" maxlength="50">
                                    <div class="invalid-feedback" id="lastNameError"></div>
                                </div>
                            </div>

                            <!-- Email -->
                            <div class="mb-3">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" class="form-control" id="email"
                                       required autocomplete="email">
                                <div class="invalid-feedback" id="emailError"></div>
                            </div>

                            <!-- Contraseña -->
                            <div class="mb-3">
                                <label for="password" class="form-label">Contraseña</label>
                                <input type="password" class="form-control" id="password"
                                       required minlength="8" autocomplete="new-password">
                                <div class="invalid-feedback" id="passwordError"></div>
                                <div class="form-text">
                                    Mínimo 8 caracteres, mayúsculas, números, caracteres especiales
                                </div>
                            </div>

                            <!-- Confirmar contraseña -->
                            <div class="mb-3">
                                <label for="passwordConfirmation" class="form-label">Confirmar contraseña</label>
                                <input type="password" class="form-control" id="passwordConfirmation"
                                       required autocomplete="new-password">
                                <div class="invalid-feedback" id="passwordConfirmationError"></div>
                            </div>

                            <!-- Teléfono (opcional) -->
                            <div class="mb-3">
                                <label for="phone" class="form-label">Teléfono (opcional)</label>
                                <input type="tel" class="form-control" id="phone"
                                       placeholder="+34 600 000 000">
                                <div class="invalid-feedback" id="phoneError"></div>
                            </div>

                            <!-- DNI (optional) -->
                            <div class="mb-3">
                                <label for="dni" class="form-label">DNI (optional)</label>
                                <input type="text" class="form-control" id="dni"
                                       placeholder="12345678A" maxlength="9">
                                <div class="invalid-feedback" id="dniError"></div>
                            </div>

                            <!-- Entregar -->
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary btn-lg" id="registerBtn">
                                    <span class="spinner-border spinner-border-sm d-none" id="registerSpinner"></span>
                                    <i class="bi bi-person-plus me-2"></i>Crear una cuenta
                                </button>
                            </div>
                        </form>

                        <div class="text-center mt-3">
                            <p class="mb-0">¿Ya tienes una cuenta?
                                <a href="?page=login">Iniciar sesión</a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/notifications.js"></script>
    <script src="../js/validations.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', handleRegistration);
    </script>
</body>
</html>
