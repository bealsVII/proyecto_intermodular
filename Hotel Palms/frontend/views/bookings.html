<div class="row mb-4">
    <div class="col-12 d-flex justify-content-between align-items-center">
        <div>
            <h1><i class="bi bi-calendar-check me-2"></i>Reservas</h1>
            <p class="text-muted mb-0">Gestionar reservas</p>
        </div>
        <div class="d-flex gap-2">
            <button class="btn btn-primary" id="newBookingBtn">
                <i class="bi bi-plus-circle me-2"></i>Nueva Reserva
            </button>
        </div>
    </div>
</div>

<!-- Filtros -->
<div class="card border-0 shadow-sm mb-4">
    <div class="card-body">
        <form id="bookingFilters" class="row g-3">
            <div class="col-md-3">
                <label class="form-label small text-muted">Estado</label>
                <select class="form-select" id="filterStatus">
                    <option value="">Todos los estados</option>
                    <option value="pending">Pendiente</option>
                    <option value="confirmed">Confirmado</option>
                    <option value="cancelled">Cancelado</option>
                    <option value="completed">Completado</option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label small text-muted">Fecha desde</label>
                <input type="date" class="form-control" id="filterDateFrom">
            </div>
            <div class="col-md-2">
                <label class="form-label small text-muted">Fecha hasta</label>
                <input type="date" class="form-control" id="filterDateTo">
            </div>
            <div class="col-md-3">
                <label class="form-label small text-muted">Buscar</label>
                <input type="text" class="form-control" id="filterBookingSearch"
                       placeholder="Confirmation code or email...">
            </div>
            <div class="col-md-2 d-flex align-items-end gap-2">
                <button type="submit" class="btn btn-primary flex-fill">
                    <i class="bi bi-search"></i> Filtro
                </button>
                <button type="reset" class="btn btn-outline-secondary">
                    <i class="bi bi-x-lg"></i>
                </button>
            </div>
        </form>
    </div>
</div>

<!-- Tabla de Reservas -->
<div class="card border-0 shadow-sm">
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-hover mb-0" id="bookingsTable">
                <thead class="table-light">
                    <tr>
                        <th>Confirmación</th>
                        <th>Cliente</th>
                        <th>Habitación</th>
                        <th>Check-in</th>
                        <th>Check-out</th>
                        <th>Invitados</th>
                        <th>Total</th>
                        <th>Estado</th>
                        <th>Comportamiento</th>
                    </tr>
                </thead>
                <tbody id="bookingsBody">
                    <tr>
                        <td colspan="9" class="text-center py-4">
                            <div class="spinner-border spinner-border-sm text-primary"></div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Paginación -->
<nav class="mt-4" id="bookingsPagination"></nav>

<!-- Nueva ventana modal de reserva -->
<div class="modal fade" id="bookingModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="bi bi-plus-circle me-2"></i>Nueva Reserva</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="bookingForm" novalidate>
                    <!-- Selección de fecha -->
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Fecha de entrada</label>
                            <input type="date" class="form-control" id="checkInDate" required>
                            <div class="invalid-feedback" id="checkInError"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Fecha de salida</label>
                            <input type="date" class="form-control" id="checkOutDate" required>
                            <div class="invalid-feedback" id="checkOutError"></div>
                        </div>
                    </div>

                    <!-- Selección de habitación -->
                    <div class="mb-3">
                        <label class="form-label">Habitación</label>
                        <select class="form-select" id="bookingRoom" required>
                            <option value="">Selecciona una habitación...</option>
                        </select>
                        <div class="invalid-feedback" id="roomError"></div>
                    </div>

                    <!-- Invitados -->
                    <div class="mb-3">
                        <label class="form-label">Número de invitados</label>
                        <input type="number" class="form-control" id="bookingGuests"
                               required min="1" value="1">
                        <div class="invalid-feedback" id="guestsError"></div>
                    </div>

                    <!-- Solicitudes especiales -->
                    <div class="mb-3">
                        <label class="form-label">Solicitudes especiales</label>
                        <textarea class="form-control" id="bookingRequests" rows="2"
                                  placeholder="Any special requirements..."></textarea>
                    </div>

                    <!-- Resumen de precios -->
                    <div class="card bg-light">
                        <div class="card-body">
                            <div class="row text-center">
                                <div class="col">
                                    <small class="text-muted">Noches</small>
                                    <p class="mb-0 fw-bold" id="summaryNights">0</p>
                                </div>
                                <div class="col">
                                    <small class="text-muted">Precio/Noche</small>
                                    <p class="mb-0 fw-bold" id="summaryPricePerNight">€0.00</p>
                                </div>
                                <div class="col">
                                    <small class="text-muted">Total</small>
                                    <p class="mb-0 fw-bold text-primary" id="summaryTotal">€0.00</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" id="saveBookingBtn">
                    <i class="bi bi-check-circle me-2"></i>Confirm Reservation
                </button>
            </div>
        </div>
    </div>
</div>
