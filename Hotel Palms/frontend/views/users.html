<div class="row mb-4">
    <div class="col-12 d-flex justify-content-between align-items-center">
        <div>
            <h1><i class="bi bi-people me-2"></i>Usuarios</h1>
            <p class="text-muted mb-0">Administrar usuarios del sistema</p>
        </div>
        <button class="btn btn-primary" id="addUserBtn">
            <i class="bi bi-plus-circle me-2"></i>Agregar usuario
        </button>
    </div>
</div>

<!-- Filters -->
<div class="card border-0 shadow-sm mb-4">
    <div class="card-body">
        <form id="userFilters" class="row g-3">
            <div class="col-md-4">
                <label class="form-label small text-muted">Role</label>
                <select class="form-select" id="filterUserRole">
                    <option value="">Todos los roles</option>
                    <option value="admin">Administrador</option>
                    <option value="receptionist">Recepcionista</option>
                    <option value="guest">Invitado</option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label small text-muted">Buscar</label>
                <input type="text" class="form-control" id="filterUserSearch"
                       placeholder="Name or email...">
            </div>
            <div class="col-md-4 d-flex align-items-end">
                <button type="submit" class="btn btn-primary w-100">
                    <i class="bi bi-search"></i> Buscar
                </button>
            </div>
        </form>
    </div>
</div>

<!-- Tabla de usuarios -->
<div class="card border-0 shadow-sm">
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Número de teléfono</th>
                        <th>Estado</th>
                        <th>Alistado</th>
                        <th>Comportamiento</th>
                    </tr>
                </thead>
                <tbody id="usersBody">
                    <tr>
                        <td colspan="8" class="text-center py-4">
                            <div class="spinner-border spinner-border-sm text-primary"></div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Paginación -->
<nav class="mt-4" id="usersPagination"></nav>
